[workspace]
name = "zotero2kindle"
description = "Send papers from Zotero to a Kindle, recompiling arXiv papers to fit the screen"
channels = ["conda-forge"]
platforms = ["osx-arm64"]

[dependencies]
python = ">=3.11"
click = "*"
lxml = "*"
requests = "*"

[pypi-dependencies]
wget = "*"

[tasks]
kindle-sync = "python zotero2kindle.py"
convert = "python arxiv2kindle.py"
preview = "open"
send = "python send_to_kindle.py"
